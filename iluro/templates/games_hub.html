{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iluro | O'yinlar</title>
    {% include "partials/favicon.html" %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}?v=20260406-pitch2">
    <link rel="stylesheet" href="{% static 'css/games.css' %}?v=20260409-games1">
</head>
<body>
    <div class="dashboard-shell">
        {% include "partials/app_sidebar_v2.html" %}

        <main class="dashboard-main games-main">
            <section class="games-section games-section--plain">
                <div class="games-grid">
                    {% for game in games %}
                    <article class="game-card {% if game.href %}is-active{% else %}is-muted{% endif %}">
                        <div class="game-card-top">
                            <span>{{ game.status }}</span>
                            <strong>{{ game.meta }}</strong>
                        </div>
                        <h4>{{ game.title }}</h4>
                        <p>{{ game.description }}</p>
                        {% if game.href %}
                        <a class="card-link" href="{% url game.href %}" target="_blank" rel="noopener noreferrer">Ochish</a>
                        {% else %}
                        <span class="card-link disabled">Tez orada</span>
                        {% endif %}
                    </article>
                    {% endfor %}
                </div>
            </section>
        </main>
    </div>
</body>
</html>
