<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xatolik | ILURO</title>
    {% include "partials/favicon.html" %}
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(180deg, #fbf7f1 0%, #f8f2e8 100%);
            color: #27170f;
        }

        .card {
            width: min(680px, 100%);
            background: rgba(255, 252, 247, 0.94);
            border: 1px solid #e6d4bd;
            border-radius: 28px;
            box-shadow: 0 22px 54px rgba(117, 78, 40, 0.12);
            padding: 30px;
        }

        .eyebrow {
            margin: 0 0 12px;
            color: #b77434;
            font-size: 13px;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            font-weight: 700;
        }

        h1 {
            margin: 0;
            font-size: clamp(32px, 6vw, 52px);
            line-height: 1.05;
        }

        p {
            margin: 16px 0 0;
            color: #8d6d55;
            font-size: 18px;
            line-height: 1.5;
        }

        a {
            display: inline-flex;
            margin-top: 24px;
            min-height: 46px;
            align-items: center;
            padding: 0 20px;
            border-radius: 999px;
            background: #b77434;
            color: #fffaf4;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="eyebrow">ILURO</p>
        <h1>Serverda vaqtinchalik xatolik yuz berdi.</h1>
        <p>Sahifani birozdan keyin qayta ochib ko'ring. Muammo davom etsa, administrator bilan bog'laning.</p>
        <a href="/">Bosh sahifaga qaytish</a>
    </main>
</body>
</html>
